# NXP kernel contribution watchlist.
#
# Covers NXP i.MX platform support and peripheral drivers commonly used in
# industrial, automotive, and robotics controllers. Vendor-specific rules are
# kept in a separate file so they can be reviewed and maintained independently.
#
# Coverage note: directory-level patterns such as soc/imx, ethernet/freescale,
# and net/can/flexcan map to established kernel paths. Filename-level globs
# should be reviewed as additional i.MX-focused data becomes available.
vendor: NXP
description: "i.MX SoCs for industrial and automotive controllers."
areas:
  - name: i.MX SoC platform
    file_patterns:
      - "drivers/soc/imx/**"
      - "arch/arm64/boot/dts/freescale/**"
    stakeholders:
      - NXP i.MX platform engineers

  - name: CAN / CAN-FD (FlexCAN)
    file_patterns:
      - "drivers/net/can/flexcan/**"
    stakeholders:
      - Industrial/automotive CAN bus integrators

  - name: Ethernet
    file_patterns:
      - "drivers/net/ethernet/freescale/**"
    stakeholders:
      - Industrial networking integrators

  - name: PWM
    file_patterns:
      - "drivers/pwm/pwm-imx*"
    stakeholders:
      - Motor/actuator control engineers

  - name: SPI / I2C
    file_patterns:
      - "drivers/spi/spi-imx.c"
      - "drivers/i2c/busses/i2c-imx.c"
    stakeholders:
      - Sensor hub integrators

  - name: ADC / IIO
    file_patterns:
      - "drivers/iio/adc/imx*"
    stakeholders:
      - Sensor hub integrators

  - name: GPIO
    file_patterns:
      - "drivers/gpio/gpio-mxc.c"
    stakeholders:
      - Board bring-up engineers

  - name: Power management
    file_patterns:
      - "drivers/cpufreq/imx*"
      - "drivers/soc/imx/gpc.c"
    stakeholders:
      - Power management engineers
