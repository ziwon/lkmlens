# Broadcom kernel contribution watchlist.
#
# VideoCore covers the large population of robotics projects built on
# Raspberry Pi compute modules.
vendor: Broadcom
description: "VideoCore GPU on Raspberry Pi SoCs."
areas:
  - name: GPU driver / display pipeline (VideoCore)
    file_patterns:
      - "drivers/gpu/drm/vc4/**"
    stakeholders:
      - Raspberry Pi / Broadcom SoC platform engineers
