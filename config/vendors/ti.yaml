# Texas Instruments kernel contribution watchlist.
#
# Covers TI SoC and peripheral support used in industrial, automotive, and
# robotics controllers. Vendor-specific rules are kept in a separate file so
# they can be reviewed and maintained independently.
#
# Coverage note: TI maintains a broad range of ADC, DAC, and sensor drivers.
# The IIO patterns below are representative rather than exhaustive and should
# be expanded as coverage requirements are validated.
vendor: Texas Instruments
description: >
  Sitara/OMAP ARM SoCs and a very large analog/sensor IC portfolio
  (ADCs, DACs) used across industrial and robotics sensor hubs.
areas:
  - name: SoC platform (Sitara/OMAP/K3)
    file_patterns:
      - "drivers/soc/ti/**"
      - "arch/arm64/boot/dts/ti/**"
    stakeholders:
      - TI SoC platform engineers

  - name: CAN (C_CAN)
    file_patterns:
      - "drivers/net/can/c_can/**"
    stakeholders:
      - Industrial/automotive CAN bus integrators

  - name: Ethernet
    file_patterns:
      - "drivers/net/ethernet/ti/**"
    stakeholders:
      - Industrial networking integrators

  - name: PWM
    file_patterns:
      - "drivers/pwm/pwm-ti*"
    stakeholders:
      - Motor/actuator control engineers

  - name: SPI / I2C
    file_patterns:
      - "drivers/spi/spi-omap*"
      - "drivers/i2c/busses/i2c-omap.c"
    stakeholders:
      - Sensor hub integrators

  - name: ADC / DAC / IIO
    file_patterns:
      - "drivers/iio/adc/ti-ads*"
      - "drivers/iio/dac/ti-dac*"
    stakeholders:
      - Sensor hub integrators

  - name: GPIO
    file_patterns:
      - "drivers/gpio/gpio-omap.c"
    stakeholders:
      - Board bring-up engineers
