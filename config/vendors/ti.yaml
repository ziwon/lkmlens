# Texas Instruments kernel contribution watchlist.
#
# 산업용·자동차·로봇 컨트롤러 쪽에서 중요함. (Grouped with NXP and Renesas
# in the original product discussion; split into per-vendor files here so
# each vendor's contribution can be tracked independently.)
#
# NOTE on confidence: TI has an unusually large surface of small
# ADC/DAC/sensor drivers (they're a major analog-IC vendor); the two IIO
# globs below are representative, not exhaustive. Worth expanding once we
# ingest a TI SoC/analog-heavy list.
vendor: Texas Instruments
description: >
  Sitara/OMAP ARM SoCs and a very large analog/sensor IC portfolio
  (ADCs, DACs) used across industrial and robotics sensor hubs.
areas:
  - name: SoC platform (Sitara/OMAP/K3)
    file_patterns:
      - "drivers/soc/ti/**"
      - "arch/arm64/boot/dts/ti/**"
    stakeholders:
      - TI SoC platform engineers

  - name: CAN (C_CAN)
    file_patterns:
      - "drivers/net/can/c_can/**"
    stakeholders:
      - Industrial/automotive CAN bus integrators

  - name: Ethernet
    file_patterns:
      - "drivers/net/ethernet/ti/**"
    stakeholders:
      - Industrial networking integrators

  - name: PWM
    file_patterns:
      - "drivers/pwm/pwm-ti*"
    stakeholders:
      - Motor/actuator control engineers

  - name: SPI / I2C
    file_patterns:
      - "drivers/spi/spi-omap*"
      - "drivers/i2c/busses/i2c-omap.c"
    stakeholders:
      - Sensor hub integrators

  - name: ADC / DAC / IIO
    file_patterns:
      - "drivers/iio/adc/ti-ads*"
      - "drivers/iio/dac/ti-dac*"
    stakeholders:
      - Sensor hub integrators

  - name: GPIO
    file_patterns:
      - "drivers/gpio/gpio-omap.c"
    stakeholders:
      - Board bring-up engineers
