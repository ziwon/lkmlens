# NVIDIA kernel contribution watchlist.
#
# Covers the Tegra SoC, Jetson platform integration, and open GPU driver paths
# represented in the Linux kernel tree.
#
# Some paths have been observed in indexed lore.kernel.org data. Remaining
# paths should be reviewed as Tegra- and Jetson-focused coverage expands.
vendor: NVIDIA
description: "Open GPU drivers (nouveau, nova) and Tegra/Jetson platforms."
areas:
  - name: Tegra SoC platform
    file_patterns:
      - "drivers/soc/tegra/**"
      - "drivers/clk/tegra/**"
      - "drivers/pinctrl/tegra/**"
      - "drivers/reset/tegra/**"
      - "drivers/memory/tegra/**"
      - "arch/arm64/boot/dts/nvidia/**"
    stakeholders:
      - NVIDIA Tegra platform engineers
      - Jetson-based device bring-up teams

  - name: Jetson platform integration
    subject_patterns:
      - "arm64: tegra:"
      - "arm64: dts: tegra:"
    stakeholders:
      - Jetson robotics platform integrators

  - name: GPU and DRM
    # drivers/gpu/nova-core has been observed in the indexed dri-devel corpus.
    file_patterns:
      - "drivers/gpu/drm/tegra/**"
      - "drivers/gpu/host1x/**"
      - "drivers/gpu/nova-core/**"
      - "drivers/gpu/drm/nouveau/**"
    subject_patterns:
      - "drm/tegra:"
      - "drm/nouveau:"
    stakeholders:
      - NVIDIA open-driver / Nouveau maintainers
      - Jetson graphics-stack integrators

  - name: Camera and media
    file_patterns:
      - "drivers/media/platform/nvidia/**"
      - "drivers/staging/media/tegra-video/**"
    stakeholders:
      - Camera/media pipeline integrators (robotics vision systems)

  - name: IOMMU
    file_patterns:
      - "drivers/iommu/tegra*"
    stakeholders:
      - Platform DMA/IOMMU engineers

  - name: PCIe
    file_patterns:
      - "drivers/pci/controller/**tegra**"
    stakeholders:
      - PCIe controller/platform engineers

  - name: Power management
    file_patterns:
      - "drivers/cpufreq/tegra*"
      - "drivers/soc/tegra/pmc.c"
    stakeholders:
      - Power management engineers (battery-powered robotics platforms)

  - name: Device tree bindings
    file_patterns:
      - "Documentation/devicetree/bindings/**/nvidia,*"
    stakeholders:
      - Board bring-up engineers
