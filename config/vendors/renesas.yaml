# Renesas kernel contribution watchlist.
#
# 산업용·자동차·로봇 컨트롤러 쪽에서 중요함. (Grouped with NXP and TI in
# the original product discussion; split into per-vendor files here so
# each vendor's contribution can be tracked independently.)
vendor: Renesas
description: >
  R-Car and RZ ARM SoCs, common in automotive and industrial control
  platforms.
areas:
  - name: R-Car / RZ SoC platform
    file_patterns:
      - "drivers/soc/renesas/**"
      - "arch/arm64/boot/dts/renesas/**"
    stakeholders:
      - Renesas SoC platform engineers

  - name: CAN
    file_patterns:
      - "drivers/net/can/rcar/**"
    stakeholders:
      - Industrial/automotive CAN bus integrators

  - name: Ethernet
    file_patterns:
      - "drivers/net/ethernet/renesas/**"
    stakeholders:
      - Industrial networking integrators

  - name: PWM
    file_patterns:
      - "drivers/pwm/pwm-rcar*"
    stakeholders:
      - Motor/actuator control engineers

  - name: SPI / I2C
    file_patterns:
      - "drivers/spi/spi-rspi*"
      - "drivers/i2c/busses/i2c-rcar*"
    stakeholders:
      - Sensor hub integrators

  - name: ADC / IIO
    file_patterns:
      - "drivers/iio/adc/rcar*"
    stakeholders:
      - Sensor hub integrators

  - name: GPIO
    file_patterns:
      - "drivers/gpio/gpio-rcar*"
    stakeholders:
      - Board bring-up engineers
