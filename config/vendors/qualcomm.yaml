# Qualcomm kernel contribution watchlist.
#
# Covers Qualcomm SoC platform support and communication between Linux and
# DSP or auxiliary processors through remoteproc, rpmsg, and QRTR.
#
# drivers/gpu/drm/msm/** has been observed in the indexed dri-devel corpus.
# The remoteproc/qcom_* path is included for forward coverage and should be
# reviewed as remoteproc-focused data becomes available.
vendor: Qualcomm
description: "Snapdragon and QCS SoCs, the Adreno GPU, and DSP offload."
areas:
  - name: SoC platform support
    file_patterns:
      - "drivers/soc/qcom/**"
      - "arch/arm64/boot/dts/qcom/**"
    stakeholders:
      - Qualcomm platform integrators
      - Device bring-up engineers

  - name: DSP firmware interface (remoteproc / rpmsg / QRTR)
    file_patterns:
      - "drivers/remoteproc/qcom_*"
      - "drivers/rpmsg/qcom_*"
      - "net/qrtr/**"
    subject_patterns:
      - "qcom: remoteproc:"
      - "remoteproc: qcom"
      - "rpmsg: qcom"
    stakeholders:
      - Qualcomm platform integrators
      - Device bring-up engineers (Hexagon DSP / co-processor comms)

  - name: Adreno GPU
    file_patterns:
      - "drivers/gpu/drm/msm/**"
    subject_patterns:
      - "drm/msm:"
    stakeholders:
      - Qualcomm platform integrators
      - Android graphics-stack team

  - name: Camera and media
    file_patterns:
      - "drivers/media/platform/qcom/**"
    stakeholders:
      - Camera/media pipeline integrators (robotics vision, smartglasses)

  - name: Power management
    file_patterns:
      - "drivers/soc/qcom/rpmh*"
      - "drivers/cpufreq/qcom-cpufreq*"
    stakeholders:
      - Power management engineers (battery-powered mobile/wearable platforms)
