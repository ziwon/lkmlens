# Intel kernel contribution watchlist.
#
# The x86 architecture tree is shared across vendors and is tracked by
# config/subsystems/arch-x86.yaml. This file is limited to Intel-specific
# drivers and architecture paths.
vendor: Intel
description: >
  x86 platform-adjacent silicon (NICs, WiFi, PCIe device management,
  perf counters, SGX) commonly found in industrial control PCs and AMRs.
areas:
  - name: GPU and display (i915 / Xe)
    file_patterns:
      - "drivers/gpu/drm/i915/**"
      - "drivers/gpu/drm/xe/**"
    subject_prefixes:
      - "drm/i915:"
      - "drm/xe:"
    stakeholders:
      - Intel graphics platform integrators
      - Industrial UI / compute platform teams

  - name: Ethernet and TSN
    file_patterns:
      - "drivers/net/ethernet/intel/**"
    stakeholders:
      - Industrial networking / TSN integrators

  - name: Intel x86 platform support
    file_patterns:
      - "arch/x86/platform/intel/**"
      - "drivers/platform/x86/intel/**"
      - "drivers/thermal/intel/**"
    stakeholders:
      - Industrial PC / AMR platform engineers
      - Firmware and power-management teams

  - name: WiFi
    file_patterns:
      - "drivers/net/wireless/intel/**"
    stakeholders:
      - Connectivity stack integrators

  - name: PCIe device management (VMD)
    file_patterns:
      - "drivers/pci/controller/vmd.c"
    stakeholders:
      - Platform/firmware bring-up engineers

  - name: Scheduler and performance counters
    file_patterns:
      - "arch/x86/events/intel/**"
    stakeholders:
      - Performance/observability platform teams

  - name: Security (SGX)
    file_patterns:
      - "arch/x86/kernel/cpu/sgx/**"
    stakeholders:
      - Platform security engineers
