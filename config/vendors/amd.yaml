# AMD kernel contribution watchlist.
#
# drivers/gpu/drm/amd/** has been observed in the indexed dri-devel corpus.
vendor: AMD
description: >
  AMD's open GPU driver stack (amdgpu) is one of the largest single
  contributors to dri-devel traffic.
areas:
  - name: GPU driver / display pipeline
    file_patterns:
      - "drivers/gpu/drm/amd/**"
    subject_patterns:
      - "drm/amdgpu:"
    stakeholders:
      - AMD GPU driver maintainers
      - Linux distro graphics-stack integrators
